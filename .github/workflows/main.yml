name: Kirim Laporan DGA

on:
  schedule:
    - cron: '15 15 * * *'  # 01:00 UTC = 08:00 WIB
  workflow_dispatch:

jobs:
  send-laporan:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          pip install pandas requests
      
      - name: Run script
        run: python send_laporan.py
